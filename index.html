<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Link para o Manifest (Transforma em App) -->
    <link rel="manifest" href="manifest.json">

    <!-- Cor da barra de status do celular -->
    <meta name="theme-color" content="#006c49">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#2a1700",
                        "inverse-primary": "#4edea3",
                        "on-surface-variant": "#3c4a42",
                        "primary-fixed": "#6ffbbe",
                        "surface-dim": "#ccdbf2",
                        "secondary-container": "#2170e4",
                        "secondary": "#0058be",
                        "on-surface": "#0d1c2d",
                        "tertiary": "#855300",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "surface-variant": "#d4e4fa",
                        "on-tertiary-container": "#523200",
                        "secondary-fixed-dim": "#adc6ff",
                        "inverse-on-surface": "#e9f1ff",
                        "surface": "#f8f9ff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#653e00",
                        "outline-variant": "#bbcabf",
                        "primary": "#006c49",
                        "outline": "#6c7a71",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#d8e2ff",
                        "on-error": "#ffffff",
                        "on-primary-container": "#00422b",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#e29100",
                        "on-background": "#0d1c2d",
                        "primary-fixed-dim": "#4edea3",
                        "surface-bright": "#f8f9ff",
                        "surface-tint": "#006c49",
                        "surface-container-low": "#eef4ff",
                        "background": "#f8f9ff",
                        "inverse-surface": "#233143",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-fixed": "#ffddb8",
                        "on-secondary-container": "#fefcff",
                        "on-primary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#004395",
                        "surface-container": "#e5efff",
                        "surface-container-highest": "#d4e4fa",
                        "surface-container-high": "#dbe9ff",
                        "on-secondary-fixed": "#001a42",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-container": "#10b981"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "grid-gutter": "12px",
                        "md": "16px",
                        "sm": "12px",
                        "xs": "8px",
                        "lg": "24px",
                        "screen-margin": "20px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "display": ["Lexend"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Lexend"],
                        "sticker-num": ["Lexend"],
                        "body-lg": ["Inter"],
                        "h2": ["Lexend"]
                    },
                    "fontSize": {
                        "display": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "sticker-num": ["18px", { "lineHeight": "1", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .sticker-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-lg min-h-screen pb-32">
    <!-- TopAppBar Shell -->
    <header
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none docked full-width top-0 sticky z-50">
        <div class="flex justify-between items-center w-full px-4 h-16">
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-extrabold text-emerald-600 dark:text-emerald-400 font-lexend tracking-tight">Meu
                    Álbum 2026</h1>
            </div>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 pt-6">
        <!-- Team Selector Drawer/Dropdown Section -->
        <section class="mb-8">
            <div class="flex flex-col gap-4">
                <div class="relative group">
                    <button id="btn-seletor"
                        class="w-full flex items-center justify-between bg-white dark:bg-slate-900 border border-outline-variant p-4 rounded-xl shadow-sm hover:border-primary transition-all active:scale-[0.98]">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full overflow-hidden border border-slate-100">
                                <img id="bandeira-topo" class="w-full h-full object-cover" src="" alt="Bandeira" />
                            </div>
                            <div class="text-left">
                                <p class="font-label-caps text-slate-500 uppercase tracking-widest text-[10px]">Seleção
                                    Selecionada</p>
                                <h2 id="nome-selecao" class="font-h2 text-on-surface">Brasil</h2>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-slate-400"
                            data-icon="expand_more">expand_more</span>
                    </button>

                    <!-- NOVO: Container do Dropdown escondido por padrão -->
                    <div id="menu-selecoes"
                        class="hidden absolute top-full left-0 w-full mt-2 bg-white dark:bg-slate-900 border border-outline-variant rounded-xl shadow-lg z-50 max-h-64 overflow-y-auto custom-scrollbar">
                        <!-- As 48 seleções serão injetadas aqui pelo JS -->
                    </div>
                </div>
                <!-- Progress Section -->
                <div class="bg-surface-container-low p-4 rounded-xl border border-slate-100">
                    <div class="flex justify-between items-end mb-2">
                        <span class="font-label-caps text-on-surface-variant">Progresso da Coleção</span>
                        <!-- 1. Zere o contador aqui -->
                        <span class="font-sticker-num text-primary">0/20</span>
                    </div>
                    <div class="h-3 w-full bg-slate-200 rounded-full overflow-hidden">
                        <!-- 2. Zere a largura (width) da barra de progresso aqui -->
                        <div class="h-full bg-primary-container rounded-full" style="width: 0%"></div>
                    </div>
                    <div class="flex gap-4 mt-3">
                        <div class="flex items-center gap-1.5">
                            <div class="w-2 h-2 rounded-full bg-primary-container"></div>
                            <!-- 3. Zere as coladas aqui -->
                            <span id="qtd-coladas" class="text-[11px] font-medium text-slate-600">0 Colecionadas</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-2 h-2 rounded-full bg-secondary-container"></div>
                            <!-- 4. Zere as repetidas aqui -->
                            <span id="qtd-repetidas" class="text-[11px] font-medium text-slate-600">0 Repetidas</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Sticker Grid Section -->
        <section id="grid-figurinhas" class="sticker-grid pb-12">
            <!-- O JavaScript vai gerar as figurinhas aqui dentro automaticamente -->
        </section>
    </main>

    <!-- BottomNavBar Shell -->
    <nav
        class="fixed bottom-0 w-full z-50 pb-safe bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <div class="flex justify-around items-center h-20 px-2 w-full">
            <a class="flex flex-col items-center justify-center bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-xl px-3 py-1 active:scale-90 transition-transform duration-200"
                href="#">
                <span class="material-symbols-outlined" data-icon="grid_view"
                    style="font-variation-settings: 'FILL' 1;">grid_view</span>
                <span class="font-lexend text-[10px] font-semibold uppercase tracking-wider mt-1">Coleção</span>
            </a>

        </div>
    </nav>
    <script src="selecoes.js"></script>
    <script src="script.js"></script>
    <script src="sw.js"></script>
</body>

</html>
